<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>City Escape: 新宿タイムシンク Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* MOBILE VIEWPORT STABILIZATION */
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: pan-x pan-y;
            -webkit-text-size-adjust: 100%;
            background-color: #0b0f19;
        }

        /* Prevent input zooms on mobile */
        input, textarea, select {
            font-size: 16px !important;
        }

        /* UI Animations and Utilities */
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanlines::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 24, 38, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            z-index: 10; background-size: 100% 4px; pointer-events: none;
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f4e6b; border-radius: 2px; }
        
        .exchanged-map-grid {
            background-color: #1e293b;
            background-image: 
                linear-gradient(to right, rgba(71, 85, 105, 0.4) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(71, 85, 105, 0.4) 1px, transparent 1px);
            background-size: 24px 24px;
        }

        /* Desktop specific overrides */
        @media screen and (min-width: 769px) {
            html, body { height: auto !important; min-height: 100vh !important; overflow-y: auto !important; }
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 font-mono">
    
    <div id="splash-screen" class="w-full h-[100dvh] flex flex-col justify-center items-center p-6 mx-auto bg-[#07090e] z-50 text-center space-y-8">
        <div class="space-y-6">
            <div class="text-[9px] tracking-widest text-red-500 font-bold border border-red-950/60 bg-red-950/20 px-3 py-1 rounded-full w-fit mx-auto font-sans">
                &gt;_ REAL ESCAPE X DOOH PROJECT
            </div>
            <h1 class="text-white text-3xl font-black tracking-wider">新宿タイムシンク</h1>
            <h2 class="text-red-600 text-2xl font-black tracking-widest">未来からのSOS</h2>
        </div>
        <button onclick="goToBriefing()" class="w-full max-w-xs bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl transition-all active:scale-[0.98]">
            捜査を開始する
        </button>
    </div>

    <div id="cover-screen" style="display: none;" class="w-full h-[100dvh] flex flex-col justify-between p-6 bg-[#0d111c] z-40 text-center">
        <div class="my-auto space-y-8 font-sans">
            <div class="text-red-500 font-mono text-[11px] uppercase border border-red-950 bg-red-950/20 px-3 py-1.5 rounded-lg w-fit mx-auto">
                依頼主「A」からの通信
            </div>
            <p class="text-xs text-slate-300 leading-relaxed text-justify bg-[#121724] border border-slate-800 p-5 rounded-xl">
                未来の新宿はゾンビハザードにより荒廃してしまった。事故の影響で、未来の技術では研究所のメインフレームにアクセスできない。君たちにデータを集めてほしい。
            </p>
        </div>
        <button onclick="startInvestigation()" class="w-full bg-slate-100 text-slate-950 font-bold py-4 rounded-xl">
            作戦エリアへ侵入
        </button>
    </div>

    <script>
        lucide.createIcons();
        let currentStage = 1;
        let startTime = null;

        function goToBriefing() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('cover-screen').style.display = 'flex';
        }

        function startInvestigation() {
            document.getElementById('cover-screen').style.display = 'none';
            // Show your HUD here
            startTime = Date.now();
        }
        
        // ... (Keep your existing functions: handleChatSubmit, printChat, etc.)
    </script>
</body>
</html>
